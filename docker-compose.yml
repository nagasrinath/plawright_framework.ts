version: '3.9'

services:
  mock-app:
    build:
      context: .
      target: builder
    command: ["node", "-e", "require('ts-node').register(); require('./mock-app/server.ts');"]
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/checkout"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  playwright:
    build:
      context: .
      target: runner
    depends_on:
      mock-app:
        condition: service_healthy
    environment:
      - CI=true
      - BASE_URL=http://mock-app:3000
    volumes:
      - ./allure-results:/app/allure-results
      - ./playwright-report:/app/playwright-report
    command: ["npx", "playwright", "test"]
